<div class="masthead">
  <div class="masthead__inner-wrap">
    <a class="site-brand" href="{{ '/' | relative_url }}" target="_self" aria-label="{{ site.title }} homepage">
      <span class="site-brand__mark">SL</span>
      <span class="site-brand__text">Songning Lai</span>
    </a>
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button aria-label="Toggle navigation menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item"><a href="{{ '/' | relative_url }}" target="_self">Homepage</a></li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item"><a href="{{ link.url | relative_url }}" target="_self">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
