<style>
  body.project-page {
    --project-bg: #07111f;
    --project-bg-soft: #0e1b2f;
    --project-panel: rgba(10, 18, 33, 0.82);
    --project-panel-strong: rgba(16, 29, 52, 0.92);
    --project-panel-alt: rgba(121, 201, 255, 0.07);
    --project-border: rgba(121, 201, 255, 0.17);
    --project-border-strong: rgba(255, 196, 82, 0.24);
    --project-text: #ecf5ff;
    --project-muted: #99aeca;
    --project-accent: #79c9ff;
    --project-accent-2: #ffc452;
    --project-accent-3: #89f0c8;
    --project-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
    background:
      radial-gradient(circle at 10% 10%, rgba(121, 201, 255, 0.18), transparent 28%),
      radial-gradient(circle at 88% 14%, rgba(255, 196, 82, 0.14), transparent 24%),
      radial-gradient(circle at 55% 120%, rgba(137, 240, 200, 0.1), transparent 32%),
      linear-gradient(180deg, #050b14 0%, #0a1322 42%, #09101c 100%);
    color: var(--project-text);
  }

  body.project-page::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(circle at center, black 38%, transparent 88%);
    opacity: 0.42;
    z-index: 0;
  }

  body.project-page::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 30%, rgba(121, 201, 255, 0.08), transparent 18%),
      radial-gradient(circle at 80% 65%, rgba(255, 196, 82, 0.08), transparent 20%);
    filter: blur(30px);
    z-index: 0;
  }

  body.project-page #main,
  body.project-page .masthead,
  body.project-page .page {
    position: relative;
    z-index: 1;
  }

  body.project-page #main {
    display: block;
    max-width: 1240px;
    padding: 1.4rem 1.5rem 4rem;
  }

  body.project-page .masthead {
    background: rgba(5, 10, 18, 0.68);
    backdrop-filter: blur(16px) saturate(130%);
    border-bottom: 1px solid rgba(121, 201, 255, 0.14);
    box-shadow: 0 10px 35px rgba(0, 0, 0, 0.18);
  }

  body.project-page .masthead a,
  body.project-page .greedy-nav a,
  body.project-page .site-title {
    color: #eaf6ff;
  }

  body.project-page .sidebar {
    display: none;
  }

  body.project-page .author__avatar img,
  body.project-page .author__content,
  body.project-page .author__urls-wrapper .btn {
    box-shadow: none;
  }

  body.project-page .page {
    float: none;
    width: 100%;
    margin: 0 auto 4rem;
  }

  body.project-page .page__inner-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 34px;
    border: 1px solid var(--project-border);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
      linear-gradient(180deg, rgba(9, 17, 30, 0.95), rgba(10, 16, 28, 0.98));
    box-shadow: var(--project-shadow);
  }

  body.project-page .page__inner-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, rgba(121, 201, 255, 0.11), transparent 32%),
      linear-gradient(300deg, rgba(255, 196, 82, 0.08), transparent 30%);
    pointer-events: none;
  }

  body.project-page .page__content {
    position: relative;
    font-family: "Manrope", sans-serif;
    font-size: 1.04rem;
    line-height: 1.82;
    color: var(--project-text);
    padding: 3rem clamp(1.3rem, 4vw, 4.2rem) 4.2rem;
  }

  body.project-page .page__content > p:first-of-type {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.82rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--project-accent);
    padding: 0.75rem 1rem;
    margin-bottom: 1.2rem;
    border: 1px solid rgba(121, 201, 255, 0.18);
    border-radius: 999px;
    background: rgba(121, 201, 255, 0.07);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  }

  body.project-page .page__content > p:first-of-type::before {
    content: "●";
    color: var(--project-accent-2);
    font-size: 0.9rem;
  }

  body.project-page .page__content > p:nth-of-type(2) {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.92rem;
    color: var(--project-muted);
    margin-top: 0.15rem;
    margin-bottom: 2rem;
    padding-left: 0.25rem;
  }

  body.project-page h1,
  body.project-page h2,
  body.project-page h3,
  body.project-page h4 {
    color: #f8fbff;
    letter-spacing: -0.02em;
  }

  body.project-page h1 {
    font-family: "Prata", serif;
    font-size: clamp(2.4rem, 4.8vw, 4.5rem);
    line-height: 1.02;
    margin: 0.25rem 0 1.1rem;
    max-width: 14ch;
    text-wrap: balance;
  }

  body.project-page h2 {
    font-family: "IBM Plex Mono", monospace;
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.95rem;
    margin-top: 2.8rem;
    margin-bottom: 1rem;
    padding: 0.55rem 0.95rem;
    border: 1px solid var(--project-border-strong);
    border-radius: 999px;
    background: rgba(255, 196, 82, 0.08);
    color: #ffe0a0;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  body.project-page h2::before {
    content: "//";
    color: var(--project-accent);
  }

  body.project-page h3 {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.98rem;
    margin-top: 1.8rem;
    color: var(--project-accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  body.project-page .project-hero {
    margin: 0 0 1.7rem;
    padding: 1.5rem 1.6rem 1.65rem;
    border-radius: 28px;
    border: 1px solid rgba(121, 201, 255, 0.18);
    background:
      linear-gradient(135deg, rgba(18, 31, 54, 0.92), rgba(8, 13, 23, 0.9));
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.05),
      0 24px 55px rgba(0, 0, 0, 0.26);
  }

  body.project-page .project-kicker {
    margin: 0 0 0.55rem;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #ffe0a0;
  }

  body.project-page .project-hero h1 {
    margin: 0;
    color: #ffffff !important;
    -webkit-text-fill-color: #ffffff;
    max-width: 18ch;
    font-size: clamp(2rem, 3.8vw, 3.55rem);
    line-height: 1.05;
  }

  body.project-page .project-subtitle {
    margin: 0.8rem 0 0;
    color: var(--project-muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  body.project-page .project-hero-actions {
    margin-top: 1.2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
  }

  body.project-page .project-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.62rem 1rem;
    border-radius: 999px;
    border: 1px solid rgba(121, 201, 255, 0.2);
    background: rgba(121, 201, 255, 0.08);
    color: #ecf5ff !important;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-decoration: none !important;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }

  body.project-page .project-btn.primary {
    background: linear-gradient(135deg, rgba(121, 201, 255, 0.95), rgba(255, 196, 82, 0.95));
    border-color: transparent;
    color: #07111f !important;
    box-shadow: 0 16px 26px rgba(121, 201, 255, 0.18);
  }

  body.project-page .project-btn.secondary {
    background: rgba(121, 201, 255, 0.08);
    color: #ecf5ff !important;
    border-color: rgba(121, 201, 255, 0.18);
  }

  body.project-page .project-btn:hover {
    transform: translateY(-1px);
    border-color: rgba(121, 201, 255, 0.38);
    box-shadow: 0 16px 26px rgba(0, 0, 0, 0.2);
  }

  body.project-page .project-tldr {
    margin: 0.3rem 0 1.5rem;
    padding: 1rem 1.1rem;
    border-radius: 22px;
    border: 1px solid rgba(255, 196, 82, 0.18);
    background: linear-gradient(90deg, rgba(255, 196, 82, 0.1), rgba(255, 196, 82, 0.03));
  }

  body.project-page .project-tldr-label {
    margin: 0 0 0.35rem;
    color: #ffe0a0;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  body.project-page p,
  body.project-page li,
  body.project-page td,
  body.project-page th {
    color: var(--project-text);
  }

  body.project-page strong {
    color: #ffffff;
  }

  body.project-page em {
    color: #d9e8ff;
  }

  body.project-page a {
    color: var(--project-accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(121, 201, 255, 0.32);
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }

  body.project-page a:hover {
    color: #eef9ff;
    border-color: rgba(121, 201, 255, 0.9);
    background: rgba(121, 201, 255, 0.08);
    box-shadow: 0 8px 20px rgba(121, 201, 255, 0.08);
  }

  body.project-page hr {
    border: 0;
    height: 1px;
    margin: 2.4rem 0;
    background: linear-gradient(90deg, transparent, rgba(121, 201, 255, 0.7), rgba(255, 196, 82, 0.55), transparent);
  }

  body.project-page ul,
  body.project-page ol {
    padding-left: 1.4rem;
  }

  body.project-page li {
    margin-bottom: 0.5rem;
  }

  body.project-page ul li::marker {
    color: var(--project-accent-2);
  }

  body.project-page ol li::marker {
    color: var(--project-accent);
  }

  body.project-page img {
    display: block;
    margin: 1.45rem auto;
    border-radius: 24px;
    border: 1px solid rgba(121, 201, 255, 0.12);
    box-shadow: 0 26px 55px rgba(0,0,0,0.34);
    background: rgba(255,255,255,0.03);
    overflow: hidden;
  }

  body.project-page table {
    width: 100%;
    display: block;
    overflow-x: auto;
    border-collapse: separate;
    border-spacing: 0;
    margin: 1.4rem 0 2rem;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.82rem;
    background: rgba(7, 12, 22, 0.84);
    border: 1px solid rgba(121, 201, 255, 0.16);
    border-radius: 20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  body.project-page thead th {
    background: linear-gradient(180deg, rgba(121, 201, 255, 0.14), rgba(121, 201, 255, 0.07));
    color: #f8fbff;
  }

  body.project-page th,
  body.project-page td {
    padding: 0.92rem 0.96rem;
    border-bottom: 1px solid rgba(121, 201, 255, 0.1);
    vertical-align: top;
  }

  body.project-page tr:last-child td {
    border-bottom: 0;
  }

  body.project-page blockquote {
    margin: 1.7rem 0;
    padding: 1.1rem 1.2rem 1.1rem 1.3rem;
    border-left: 3px solid var(--project-accent-2);
    background: linear-gradient(90deg, rgba(255, 196, 82, 0.11), rgba(255, 196, 82, 0.03));
    color: #ffeab8;
    border-radius: 0 16px 16px 0;
  }

  body.project-page code,
  body.project-page pre {
    font-family: "IBM Plex Mono", monospace;
  }

  body.project-page :not(pre) > code {
    color: #ffe9a6;
    background: rgba(255, 196, 82, 0.12);
    border: 1px solid rgba(255, 196, 82, 0.14);
    border-radius: 8px;
    padding: 0.14rem 0.35rem;
  }

  body.project-page pre {
    background: linear-gradient(180deg, rgba(5, 9, 16, 0.98), rgba(8, 12, 20, 0.94));
    border: 1px solid rgba(121, 201, 255, 0.15);
    border-radius: 22px;
    padding: 1.15rem 1.2rem;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  body.project-page .page__footer,
  body.project-page .pagination,
  body.project-page .author__urls-wrapper {
    display: none;
  }

  @media (min-width: 1000px) {
    body.project-page .page__content > p:first-of-type,
    body.project-page .page__content > p:nth-of-type(2) {
      max-width: 80%;
    }
  }

  @media (max-width: 900px) {
    body.project-page .page {
      width: 100%;
      margin-top: 0;
    }

    body.project-page .page__inner-wrap {
      border-radius: 24px;
    }

    body.project-page .page__content {
      font-size: 1rem;
      padding: 2rem 1.05rem 2.7rem;
    }

    body.project-page h1 {
      max-width: none;
    }

    body.project-page .project-hero {
      padding: 1.25rem 1.1rem 1.35rem;
      border-radius: 22px;
    }
  }
</style>
