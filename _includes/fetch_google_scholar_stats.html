<script>
    function updateGoogleScholarStats() {
        var totalCitationEl = document.getElementById('total_cit');
        var citationEles = document.getElementsByClassName('show_paper_citations')
        if (!totalCitationEl && citationEles.length === 0) {
            return;
        }

        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        fetch(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
            .then(function (response) { return response.json(); })
            .then(function (data) {
            var totalCitation = data['citedby'];
            if (totalCitationEl) {
                totalCitationEl.innerHTML = totalCitation;
            }
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                var publication = data['publications'] && data['publications'][paperId];
                if (!publication) return;
                var numCitations = publication['num_citations'];
                var label = document.documentElement.lang === 'zh-CN' ? '| 引用次数：' : '| Citations: ';
                element.innerHTML = label + numCitations;
            });
        }).catch(function () {});
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateGoogleScholarStats);
    } else {
        updateGoogleScholarStats();
    }
</script>
